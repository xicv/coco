<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">coco comic icon</title>
  <desc id="desc">A cute comic-style coconut mascot with a speech bubble saying coco.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#fff7bf"/>
      <stop offset="0.58" stop-color="#ffe483"/>
      <stop offset="1" stop-color="#ffd34f"/>
    </radialGradient>
    <linearGradient id="shell" x1="28%" x2="72%" y1="12%" y2="93%">
      <stop offset="0" stop-color="#c47b42"/>
      <stop offset="0.68" stop-color="#9d5b35"/>
      <stop offset="1" stop-color="#704329"/>
    </linearGradient>
    <linearGradient id="leaf" x1="30%" x2="90%" y1="0" y2="100%">
      <stop offset="0" stop-color="#6fe38a"/>
      <stop offset="1" stop-color="#19a665"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="#261c25" flood-opacity=".35"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="8" r="3" fill="#ff9065" opacity=".36"/>
      <circle cx="22" cy="20" r="2.4" fill="#ffb340" opacity=".44"/>
    </pattern>
  </defs>

  <rect x="25" y="25" width="462" height="462" rx="82" fill="url(#bg)" stroke="#29202c" stroke-width="10"/>

  <!-- comic burst -->
  <g opacity=".65">
    <path d="M256 256 33 16 92 8z" fill="#ff695f"/>
    <path d="M256 256 168 0 221 0z" fill="#fff1a8"/>
    <path d="M256 256 291 0 345 0z" fill="#ffcf45"/>
    <path d="M256 256 428 9 496 77z" fill="#ff695f"/>
    <path d="M256 256 512 211 512 268z" fill="#fff1a8"/>
    <path d="M256 256 495 436 437 496z" fill="#ffcf45"/>
    <path d="M256 256 285 512 228 512z" fill="#fff1a8"/>
    <path d="M256 256 70 494 16 437z" fill="#ff695f"/>
    <path d="M256 256 0 300 0 242z" fill="#ffcf45"/>
  </g>
  <rect x="45" y="45" width="422" height="422" rx="70" fill="url(#dots)" opacity=".8"/>

  <!-- speech bubble -->
  <g filter="url(#softShadow)">
    <path d="M94 73h118c18 0 33 15 33 33v14c0 18-15 33-33 33h-23l26 34-54-34H94c-18 0-33-15-33-33v-14c0-18 15-33 33-33z" fill="#29202c"/>
    <path d="M94 82h118c13 0 24 11 24 24v14c0 13-11 24-24 24h-34l18 24-37-24H94c-13 0-24-11-24-24v-14c0-13 11-24 24-24z" fill="#fffdf3"/>
    <text x="153" y="126" text-anchor="middle" font-family="Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#29202c" letter-spacing="-1">coco</text>
    <text x="156" y="128" text-anchor="middle" font-family="Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#ff675f" opacity=".85" letter-spacing="-1">coco</text>
    <text x="153" y="126" text-anchor="middle" font-family="Inter, ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="900" fill="#29202c" letter-spacing="-1">coco</text>
  </g>

  <!-- mascot -->
  <ellipse cx="256" cy="413" rx="133" ry="27" fill="#261c25" opacity=".75"/>
  <g filter="url(#softShadow)">
    <path d="M131 281 82 251" stroke="#29202c" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M131 281 82 251" stroke="#b86e3e" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="78" cy="248" r="20" fill="#29202c"/>
    <circle cx="78" cy="248" r="14" fill="#fff0b4"/>

    <path d="M381 278 434 239" stroke="#29202c" stroke-width="22" stroke-linecap="round" fill="none"/>
    <path d="M381 278 434 239" stroke="#b86e3e" stroke-width="12" stroke-linecap="round" fill="none"/>
    <circle cx="439" cy="235" r="21" fill="#29202c"/>
    <circle cx="439" cy="235" r="15" fill="#fff0b4"/>

    <circle cx="256" cy="276" r="140" fill="#29202c"/>
    <circle cx="256" cy="276" r="128" fill="url(#shell)"/>
    <path d="M151 241c35-92 142-125 211-54-23-60-78-91-137-81-56 10-101 54-113 111z" fill="#d58b4e" opacity=".9"/>
    <path d="M139 288c18 88 102 142 190 109" fill="none" stroke="#6c3e28" stroke-width="9" stroke-linecap="round" opacity=".55"/>

    <!-- coconut freckles -->
    <g fill="#5b331f" opacity=".95">
      <circle cx="185" cy="221" r="4"/><circle cx="211" cy="199" r="5"/><circle cx="162" cy="239" r="4"/>
      <circle cx="238" cy="301" r="4"/><circle cx="279" cy="473" r="0"/><circle cx="291" cy="311" r="5"/>
      <circle cx="325" cy="233" r="4"/><circle cx="354" cy="255" r="3"/><circle cx="196" cy="324" r="5"/>
      <circle cx="266" cy="348" r="4"/><circle cx="278" cy="213" r="3"/>
    </g>

    <!-- leaf crown -->
    <path d="M223 129c11-53 60-78 120-52-7 49-43 77-103 77z" fill="#29202c"/>
    <path d="M231 125c12-42 52-61 100-43-8 37-39 59-88 60z" fill="url(#leaf)"/>
    <path d="M259 145c15-38 54-59 108-55-12 39-43 63-96 67z" fill="#29202c"/>
    <path d="M268 142c15-29 46-45 86-42-13 28-39 45-81 49z" fill="#61d67d"/>
    <path d="M263 151 319 101" stroke="#17965e" stroke-width="7" stroke-linecap="round"/>

    <!-- face -->
    <ellipse cx="208" cy="250" rx="22" ry="30" fill="#1d1a24"/>
    <ellipse cx="302" cy="250" rx="22" ry="30" fill="#1d1a24"/>
    <circle cx="208" cy="241" r="8" fill="#fff"/>
    <circle cx="302" cy="241" r="8" fill="#fff"/>
    <circle cx="220" cy="266" r="5" fill="#fff" opacity=".85"/>
    <circle cx="314" cy="266" r="5" fill="#fff" opacity=".85"/>
    <circle cx="184" cy="295" r="22" fill="#ff8f93" opacity=".92"/>
    <circle cx="328" cy="295" r="22" fill="#ff8f93" opacity=".92"/>
    <path d="M225 304c11 22 49 22 62 0" fill="none" stroke="#1d1a24" stroke-width="8" stroke-linecap="round"/>
    <path d="M250 306c2 9 12 9 14 0" fill="none" stroke="#ff6d82" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- sparkles and action marks -->
  <g stroke="#29202c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M400 91 414 124 448 138 415 151 401 185 388 152 354 138 387 124z" fill="#fff"/>
    <path d="M98 349 107 371 129 380 107 389 98 411 89 389 67 380 89 371z" fill="#fff"/>
    <path d="M426 160 459 177" fill="none" stroke="#ff675f"/>
    <path d="M87 181 56 199" fill="none" stroke="#ff675f"/>
  </g>
</svg>
